<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LangGraph Agent Studio</title>
  
  <!-- CDN Links for React, Tailwind, and Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    }
    
    /* Scrollbar styles for modern look */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Gradients and animation */
    @keyframes pulse-indigo {
      0%, 100% { border-color: rgba(99, 102, 241, 0.4); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
      50% { border-color: rgba(99, 102, 241, 1); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.4); }
    }
    .animate-pulse-indigo {
      animation: pulse-indigo 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .grid-bg {
      background-size: 20px 20px;
      background-image: linear-gradient(to right, rgba(226, 232, 240, 0.5) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(226, 232, 240, 0.5) 1px, transparent 1px);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">
  <div id="root"></div>

  <!-- React Code with Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // React-friendly SVG Icon Dictionary to avoid direct DOM mutations
    const icons = {
      "git-branch": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>,
      "check-circle": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
      "clock": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
      "database": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path></svg>,
      "dollar-sign": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>,
      "play": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
      "x": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
      "rotate-ccw": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>,
      "info": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
      "chevron-down": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="6 9 12 15 18 9"></polyline></svg>,
      "chevron-right": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="9 18 15 12 9 6"></polyline></svg>,
      "code": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>,
      "sliders": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>,
      "activity": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
      "file-input": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="2" y1="13" x2="8" y2="13"></line><line x1="6" y1="9" x2="10" y2="13"></line></svg>,
      "split": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 3h5v5"></path><path d="M8 3H3v5"></path><path d="M12 21v-8.3a4 4 0 0 0-1.17-2.83L6.2 5.2"></path><path d="M12 12.7l4.63-4.63"></path></svg>,
      "wrench": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>,
      "check-square": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>,
      "refresh-cw": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
      "shield-alert": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
      "help-circle": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
      "alert-triangle": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
      "user-check": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>,
      "message-square": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
      "file-check": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="9 15 11 17 15 13"></polyline></svg>,
      "square": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>,
      "terminal": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>,
      "layers": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polygon points="2 17 12 22 22 17"></polygon><polygon points="2 12 12 17 22 12"></polygon></svg>,
      "zoom-in": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>,
      "zoom-out": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>,
      "maximize": (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
    };

    const Icon = ({ name, className = "", size = 18 }) => {
      const SvgIcon = icons[name];
      if (!SvgIcon) return null;
      return <SvgIcon className={className} width={size} height={size} />;
    };

    // Beautiful Collapsible JSON Inspector
    const JsonInspector = ({ data, label, level = 0 }) => {
      if (typeof data !== 'object' || data === null) {
        let valueColor = "text-slate-800";
        if (typeof data === 'string') valueColor = "text-emerald-600";
        if (typeof data === 'number') valueColor = "text-indigo-600";
        if (typeof data === 'boolean') valueColor = "text-amber-600";
        return (
          <span className={`${valueColor} font-mono text-xs break-all`}>
            {JSON.stringify(data)}
          </span>
        );
      }

      const [isOpen, setIsOpen] = useState(level < 1);
      const isArray = Array.isArray(data);
      const keys = Object.keys(data);

      if (keys.length === 0) {
        return <span className="text-slate-400 font-mono text-xs">{isArray ? "[]" : "{}"}</span>;
      }

      return (
        <div className="pl-3 font-mono text-xs select-none">
          <div 
            onClick={() => setIsOpen(!isOpen)} 
            className="cursor-pointer hover:bg-slate-100 p-0.5 rounded transition flex items-center gap-1 text-slate-600"
          >
            <Icon 
              name={isOpen ? "chevron-down" : "chevron-right"} 
              size={12} 
              className="text-slate-400" 
            />
            <span className="font-semibold text-slate-700">{label ? `${label}: ` : ""}</span>
            <span className="text-slate-400">
              {isArray ? `Array(${keys.length}) [` : `Object {`}
            </span>
            {!isOpen && <span className="text-slate-400"> ... </span>}
            {!isOpen && <span>{isArray ? "]" : "}"}</span>}
          </div>

          {isOpen && (
            <div className="border-l border-slate-200 pl-3 my-0.5 ml-1.5 flex flex-col gap-0.5">
              {keys.map((key) => (
                <div key={key} className="py-0.5">
                  <JsonInspector 
                    data={data[key]} 
                    label={key} 
                    level={level + 1} 
                  />
                </div>
              ))}
            </div>
          )}
          {isOpen && <div className="text-slate-400 pl-4">{isArray ? "]" : "}"}</div>}
        </div>
      );
    };

    // Detailed CLI reasoning terminal — streams the Python core's agent_logger lines.
    const ReasoningStream = ({ logs, emptyHint }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
      }, [logs]);

      return (
        <div
          ref={ref}
          className="bg-slate-900 text-slate-200 font-mono text-[11px] p-4 rounded-xl flex flex-col gap-1.5 h-full overflow-y-auto select-text shadow-inner"
        >
          {(!logs || logs.length === 0) ? (
            <div className="text-slate-500 text-center py-12">{emptyHint || "Log stream empty. Run graph execution to trace."}</div>
          ) : (
            logs.map((line, idx) => {
              let color = "text-slate-300";
              if (line.includes("[ERROR]")) color = "text-rose-400 font-semibold";
              if (line.includes("[WARNING]") || line.includes("[retry]")) color = "text-amber-300";
              if (line.includes("[SYS]")) color = "text-sky-400";
              if (line.includes("[routing]")) color = "text-fuchsia-300";

              const formattedLine = line.replace(
                /\[(intake|classify|tool|evaluate|answer|clarify|risky_action|approval|retry|dead_letter|finalize)\]/g,
                '<span class="text-violet-300 font-bold">[$1]</span>'
              );

              return (
                <div key={idx} className={`${color} leading-relaxed flex items-start gap-1`}>
                  <span className="text-[10px] text-slate-500 select-none">{String(idx + 1).padStart(2, '0')}.</span>
                  <span dangerouslySetInnerHTML={{ __html: formattedLine }}></span>
                </div>
              );
            })
          )}
        </div>
      );
    };

    // Node coordinates on Canvas — RAW STATIC positions, hardcoded directly.
    // No layout engine (no dagre/elk/getLayoutedElements), no fitView. These x/y are final.
    const nodeCoordinates = {
      START: { x: 30, y: 260, type: "system", label: "START", icon: "play" },
      intake: { x: 210, y: 260, type: "node", label: "intake", icon: "file-input" },
      classify: { x: 390, y: 260, type: "router", label: "classify", icon: "split" },
      risky_action: { x: 570, y: 90, type: "node", label: "risky_action", icon: "alert-triangle" },
      approval: { x: 750, y: 90, type: "human", label: "approval", icon: "user-check" },
      tool: { x: 750, y: 260, type: "tool", label: "tool", icon: "wrench" },
      evaluate: { x: 930, y: 260, type: "router", label: "evaluate", icon: "check-square" },
      clarify: { x: 570, y: 430, type: "node", label: "clarify", icon: "help-circle" },
      retry: { x: 750, y: 430, type: "node", label: "retry", icon: "refresh-cw" },
      dead_letter: { x: 930, y: 430, type: "node", label: "dead_letter", icon: "shield-alert" },
      answer: { x: 1110, y: 260, type: "node", label: "answer", icon: "message-square" },
      finalize: { x: 1290, y: 260, type: "node", label: "finalize", icon: "file-check" },
      END: { x: 1470, y: 260, type: "system", label: "END", icon: "square" }
    };

    const graphEdges = [
      { from: "START", to: "intake" },
      { from: "intake", to: "classify" },
      { from: "classify", to: "answer", label: "simple" },
      { from: "classify", to: "tool", label: "tool" },
      { from: "classify", to: "clarify", label: "missing" },
      { from: "classify", to: "risky_action", label: "risky" },
      { from: "classify", to: "retry", label: "error" },
      { from: "tool", to: "evaluate" },
      { from: "evaluate", to: "answer", label: "success" },
      { from: "evaluate", to: "retry", label: "fail" },
      { from: "retry", to: "tool", label: "attempt < limit" },
      { from: "retry", to: "dead_letter", label: "attempt >= limit" },
      { from: "risky_action", to: "approval" },
      { from: "approval", to: "tool", label: "approved" },
      { from: "approval", to: "clarify", label: "rejected" },
      { from: "dead_letter", to: "finalize" },
      { from: "clarify", to: "finalize" },
      { from: "answer", to: "finalize" },
      { from: "finalize", to: "END" }
    ];

    function App() {
      // States
      const [query, setQuery] = useState("");
      const [maxAttempts, setMaxAttempts] = useState(3);
      const [zoom, setZoom] = useState(0.55); // Static initial zoom — fits the static graph, NOT auto-fit
      const [pan, setPan] = useState({ x: 0, y: 0 }); // Enforce static viewport pan position
      const [scenarios, setScenarios] = useState([]);
      const [currentState, setCurrentState] = useState(null);
      const [threadId, setThreadId] = useState("");
      const [isPending, setIsPending] = useState(false);
      const [activeNode, setActiveNode] = useState(null);
      const [nodeStates, setNodeStates] = useState({}); // { nodeName: 'idle'|'running'|'success'|'failed' }
      const [activeTab, setActiveTab] = useState("logs"); // "logs" | "hitl" | "tools"
      const [terminalLogs, setTerminalLogs] = useState([]);
      const [selectedNode, setSelectedNode] = useState(null); // Node clicked for details
      const [interrupted, setInterrupted] = useState(false);
      const [approvalRequest, setApprovalRequest] = useState(null);
      const [metrics, setMetrics] = useState({ steps: 0, latency: 0, tokens: 0, cost: 0 });

      // Config Options
      const [temperature, setTemperature] = useState(0.0);
      const [concurrency, setConcurrency] = useState(1);

      // Refs
      const canvasRef = useRef(null);

      // Node geometry. Positions live in state so nodes can be dragged freely;
      // labels/icons/types come from the static nodeCoordinates template.
      const NODE_W = 150, NODE_H = 52;
      const [nodes, setNodes] = useState(() => {
        const o = {};
        for (const k in nodeCoordinates) o[k] = { ...nodeCoordinates[k] };
        return o;
      });
      const [draggingNode, setDraggingNode] = useState(null); // { name, offX, offY }

      // Canvas panning states
      const [isDragging, setIsDragging] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

      // Convert a screen point to graph-logical coords (undo the canvas pan+zoom transform).
      const toLogical = (clientX, clientY) => {
        const r = canvasRef.current.getBoundingClientRect();
        return { x: (clientX - r.left - pan.x) / zoom, y: (clientY - r.top - pan.y) / zoom };
      };

      // Auto-fit: scale the viewport so EVERY node (including dragged ones) fits the canvas.
      // Only sets zoom/pan — never rewrites node positions.
      const fitView = () => {
        const el = canvasRef.current;
        if (!el) return;
        const xs = Object.values(nodes).map(n => n.x);
        const ys = Object.values(nodes).map(n => n.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs) + NODE_W;
        const minY = Math.min(...ys), maxY = Math.max(...ys) + NODE_H;
        const PAD = 28;
        const gw = maxX - minX, gh = maxY - minY;
        const s = Math.max(0.2, Math.min((el.clientWidth - PAD * 2) / gw, (el.clientHeight - PAD * 2) / gh, 1));
        setZoom(s);
        setPan({
          x: PAD - minX * s + Math.max(0, (el.clientWidth - PAD * 2 - gw * s) / 2),
          y: PAD - minY * s + Math.max(0, (el.clientHeight - PAD * 2 - gh * s) / 2),
        });
      };
      useEffect(() => {
        const t = setTimeout(fitView, 80);
        window.addEventListener('resize', fitView);
        return () => { clearTimeout(t); window.removeEventListener('resize', fitView); };
      }, []);

      // Fetch sample chips on mount
      useEffect(() => {
        fetch('/api/scenarios')
          .then(r => r.json())
          .then(setScenarios)
          .catch(console.error);
      }, []);

      // Handle raw state calculation for visual nodes
      const calculateNodeStatesFromState = (state, activeNodeName) => {
        const events = state?.events || [];
        const newStates = {};

        // Default all to idle
        Object.keys(nodeCoordinates).forEach(name => {
          newStates[name] = "idle";
        });

        // Set status based on historical execution events
        events.forEach(e => {
          const nodeName = e.node;
          if (nodeCoordinates[nodeName]) {
            if (e.event_type === "failed" || e.event_type === "escalated") {
              newStates[nodeName] = "failed";
            } else if (e.event_type === "retrying") {
              newStates[nodeName] = "failed";
            } else {
              newStates[nodeName] = "success";
            }
          }
        });

        // Set actively running node
        if (activeNodeName && nodeCoordinates[activeNodeName]) {
          newStates[activeNodeName] = "running";
        }

        setNodeStates(newStates);
      };

      // Simulated animated log printer to visualize node transitions in real-time
      const animateLogsAndTransitions = (logs, finalState, wasInterrupted, approvalReq, append = false) => {
        if (!logs || logs.length === 0) {
          setCurrentState(finalState);
          calculateNodeStatesFromState(finalState, null);
          return;
        }

        let index = 0;
        setIsPending(true);
        if (!append) setTerminalLogs([]);

        const interval = setInterval(() => {
          if (index >= logs.length) {
            clearInterval(interval);
            setIsPending(false);
            setCurrentState(finalState);
            calculateNodeStatesFromState(finalState, wasInterrupted ? "approval" : null);
            
            // Sync final metrics
            const steps = finalState?.events?.length || 0;
            const latency = finalState?.events?.reduce((acc, curr) => acc + (curr.latency_ms || 0), 0) || 0;
            const tokenEstimate = steps * 480;
            setMetrics({
              steps,
              latency,
              tokens: tokenEstimate,
              cost: parseFloat((tokenEstimate * 0.000002).toFixed(5))
            });

            if (wasInterrupted) {
              setInterrupted(true);
              setApprovalRequest(approvalReq);
              setActiveTab("hitl");
            }
            return;
          }

          const currentLogLine = logs[index];
          setTerminalLogs(prev => [...prev, currentLogLine]);

          const match = currentLogLine.match(/\[(intake|classify|tool|evaluate|answer|clarify|risky_action|approval|retry|dead_letter|finalize)\]/);
          let detectedNode = null;
          if (match && match[1]) {
            detectedNode = match[1];
            setActiveNode(detectedNode);
          } else if (currentLogLine.includes("[routing]")) {
            detectedNode = "classify";
          }

          const mockEvents = logs.slice(0, index + 1).map(line => {
            const m = line.match(/\[(intake|classify|tool|evaluate|answer|clarify|risky_action|approval|retry|dead_letter|finalize)\]/);
            return m ? { node: m[1], event_type: line.includes("failed") ? "failed" : "completed" } : null;
          }).filter(Boolean);

          const tempState = { events: mockEvents };
          calculateNodeStatesFromState(tempState, detectedNode);

          index++;
        }, 150);
      };

      // API calls
      const handleRun = async () => {
        if (!query.trim()) return;
        setIsPending(true);
        setInterrupted(false);
        setApprovalRequest(null);
        setActiveNode(null);
        setTerminalLogs(["[SYS] Đang khởi tạo luồng agent..."]);

        try {
          const res = await fetch('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query.trim(), max_attempts: Number(maxAttempts) })
          }).then(r => r.json());

          if (res.error) {
            setTerminalLogs(prev => [...prev, `[ERROR] ${res.error}`]);
            setIsPending(false);
            return;
          }

          setThreadId(res.thread_id);
          animateLogsAndTransitions(res.logs, res.state, res.interrupted, res.approval_request, false);
        } catch (err) {
          setTerminalLogs(prev => [...prev, `[ERROR] Connection failed: ${err.message}`]);
          setIsPending(false);
        }
      };

      const handleDecide = async (approved) => {
        setIsPending(true);
        setInterrupted(false);
        setTerminalLogs(prev => [...prev, `[SYS] Gửi phê duyệt: ${approved ? 'ĐỒNG Ý' : 'TỪ CHỐI'}`]);

        try {
          const res = await fetch('/api/resume', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              thread_id: threadId,
              approved,
              comment: approved ? 'Approved via Studio UI' : 'Rejected via Studio UI'
            })
          }).then(r => r.json());

          if (res.error) {
            setTerminalLogs(prev => [...prev, `[ERROR] Resume failed: ${res.error}`]);
            setIsPending(false);
            return;
          }

          animateLogsAndTransitions(res.logs, res.state, false, null, true);
        } catch (err) {
          setTerminalLogs(prev => [...prev, `[ERROR] Resume connection error: ${err.message}`]);
          setIsPending(false);
        }
      };

      const handleReset = () => {
        setQuery("");
        setCurrentState(null);
        setThreadId("");
        setTerminalLogs(["[SYS] Reset. Chờ truy vấn mới."]);
        setInterrupted(false);
        setApprovalRequest(null);
        setActiveNode(null);
        setNodeStates({});
        setMetrics({ steps: 0, latency: 0, tokens: 0, cost: 0 });
      };



      // Start dragging a single node (called from the node's onMouseDown).
      const startNodeDrag = (e, name) => {
        e.stopPropagation(); // don't start a canvas pan
        const p = toLogical(e.clientX, e.clientY);
        setDraggingNode({ name, offX: p.x - nodes[name].x, offY: p.y - nodes[name].y, moved: false });
      };

      // Canvas Dragging Panning Handler
      const handleMouseDown = (e) => {
        if (e.target.tagName === 'svg' || e.target.id === 'canvas-bg') {
          setIsDragging(true);
          setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
        }
      };

      const handleMouseMove = (e) => {
        if (draggingNode) {
          const p = toLogical(e.clientX, e.clientY);
          const nx = p.x - draggingNode.offX, ny = p.y - draggingNode.offY;
          setNodes(prev => ({ ...prev, [draggingNode.name]: { ...prev[draggingNode.name], x: nx, y: ny } }));
          if (!draggingNode.moved) setDraggingNode(d => d && { ...d, moved: true });
          return;
        }
        if (isDragging) {
          setPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
        }
      };

      const handleMouseUp = () => {
        setIsDragging(false);
        setDraggingNode(null);
      };

      // Helper to check if edge is active in execution history path
      const isEdgeActive = (edge) => {
        if (!currentState || !currentState.events) return false;
        const events = currentState.events;
        const visitedNodes = events.map(e => e.node);
        
        const startIdx = visitedNodes.indexOf(edge.from);
        const endIdx = visitedNodes.indexOf(edge.to);
        
        if (edge.from === "START" && visitedNodes.length > 0) return true;
        if (edge.to === "END" && visitedNodes.includes("finalize")) return true;
        if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) return true;
        return false;
      };

      return (
        <div className="flex flex-col min-h-screen">
          {/* Header */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-sm">

              <div className="flex items-center gap-3 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2">

                  <Icon name="dollar-sign" size={16} />
                </div>
                <div>
                  <span className="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Chi phí ước tính</span>
                  <p className="text-sm font-bold text-slate-800 leading-none mt-1">${metrics.cost.toFixed(5)}</p>
                </div>
              </div>
            </div>
          </header>

          {/* Main Dashboard Panel Controls */}
          <div className="bg-white border-b border-slate-200 px-6 py-4">
            <div className="max-w-[1400px] mx-auto flex flex-col md:flex-row gap-4 items-end">
              <div className="flex-1 w-full">
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1">User Prompt / Input State</label>
                <div className="relative">
                  <textarea 
                    id="q" 
                    value={query}
                    onChange={(e) => setQuery(e.target.value)}
                    placeholder="Nhập yêu cầu cho agent (Ví dụ: Tra cứu đơn hàng 12345 hoặc hoàn tiền vé...)" 
                    className="w-full pl-3 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition resize-none min-h-[46px]"
                  />
                  {query && (
                    <button 
                      onClick={() => setQuery("")}
                      className="absolute right-3 top-3 text-slate-400 hover:text-slate-600"

                      <Icon name="x" size={16} />
                    </button>
                  )}
                </div>
              </div>

              <div className="w-full md:w-32">
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1">Max Retries</label>
                <input

              <div className="flex gap-2 w-full md:w-auto">
                <button

                >
                  <Icon name="play" size={16} className={isPending ? "animate-spin" : ""} />
                  Run Agent
                </button>
                
                <button 
                  onClick={handleReset}
                  className="flex items-center justify-center p-2.5 border border-slate-200 hover:bg-slate-50 text-slate-600 hover:text-slate-800 rounded-xl transition"
                  title="Reset Visualizer"
                >
                  <Icon name="rotate-ccw" size={18} />
                </button>
              </div>
            </div>

            {/* Scenario Pre-fills Chips */}
            <div className="max-w-[1400px] mx-auto mt-3 flex flex-wrap items-center gap-2">
              <span className="text-xs font-semibold text-slate-400">Mẫu (Sample Scenarios):</span>
              <div className="flex flex-wrap gap-1.5">
                {scenarios.map(s => {
                  const cleanedId = s.id.replace(/^S\d+_/,'');
                  return (
                    <button 
                      key={s.id}
                      onClick={() => {
                        setQuery(s.query);
                        setMaxAttempts(s.max_attempts || 3);
                      }}
                      className="px-3 py-1 text-xs bg-slate-100 hover:bg-indigo-50 hover:text-indigo-600 border border-slate-200 rounded-full font-medium transition"
                      title={s.query}
                    >
                      {cleanedId}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Core Layout Grid */}
          <main className="flex-1 w-full max-w-[1760px] mx-auto px-6 py-6 grid grid-cols-1 xl:grid-cols-12 gap-6">
            
            {/* LEFT COLUMN: State & Config Panel (30% equivalent) */}
            <div className="xl:col-span-3 flex flex-col gap-6">
              
              {/* Metadata details */}
              <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <h2 className="text-xs font-bold uppercase tracking-wider text-indigo-600 border-b border-slate-100 pb-3 flex items-center gap-2">
                  <Icon name="info" size={14} />
                  Graph Metadata
                </h2>
                <div className="mt-4 flex flex-col gap-3 text-sm">
                  <div className="flex justify-between border-b border-slate-50 pb-2">
                    <span className="text-slate-500 font-medium">Thread ID:</span>
                    <span className="font-mono text-xs font-semibold text-slate-700 bg-slate-100 px-1.5 py-0.5 rounded truncate max-w-[160px]" title={threadId || "Not running"}>
                      {threadId ? threadId.slice(0, 12) + "..." : "Chưa có"}
                    </span>
                  </div>
                  <div className="flex justify-between border-b border-slate-50 pb-2">
                    <span className="text-slate-500 font-medium">Checkpointer:</span>
                    <span className="font-semibold text-slate-700">MemorySaver</span>
                  </div>
                  <div className="flex justify-between border-b border-slate-50 pb-2">
                    <span className="text-slate-500 font-medium">HITL Breakpoint:</span>
                    <span className="flex items-center gap-1 font-semibold text-slate-700">
                      <span className={`w-2 h-2 rounded-full ${interrupted ? 'bg-amber-500 animate-pulse' : 'bg-slate-300'}`}></span>
                      {interrupted ? 'Đang ngắt (Awaiting Approval)' : 'Sẵn sàng'}
                    </span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-500 font-medium">Concurrently Nodes:</span>
                    <span className="font-semibold text-slate-700">Multi-threading ready</span>
                  </div>
                </div>
              </div>

              {/* Action Required: Human-in-the-Loop Sidebar Notification Block */}
              {interrupted && approvalRequest && (
                <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 shadow-sm ring-4 ring-amber-500/10 animate-pulse-indigo">
                  <h3 className="text-xs font-bold uppercase tracking-wider text-amber-800 flex items-center gap-2">
                    <Icon name="shield-alert" size={14} className="text-amber-600" />
                    ⚠️ Action Required: HITL
                  </h3>
                  <div className="mt-3 text-xs text-slate-700 leading-relaxed">
                    <p className="font-semibold text-slate-800">
                      Agent paused at 'approval' node. Waiting for tool authorization...
                    </p>
                    <div className="bg-white border border-amber-100 rounded-xl p-3 my-3 font-mono text-[10px] text-slate-600 break-words leading-normal">
                      <strong>Proposed Action:</strong>
                      <p className="mt-1">{approvalRequest.proposed_action || "Đang chờ ý kiến phê duyệt..."}</p>
                    </div>
                  </div>
                  <div className="flex gap-2 mt-4">
                    <button 
                      onClick={() => handleDecide(true)}
                      className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2.5 rounded-xl transition shadow-sm"
                    >
                      Approve & Continue
                    </button>
                    <button 
                      onClick={() => handleDecide(false)}
                      className="flex-1 border border-rose-200 bg-rose-50 hover:bg-rose-100 text-rose-800 font-bold text-xs py-2.5 rounded-xl transition shadow-sm text-center"
                    >
                      Reject / Escalate
                    </button>
                  </div>
                </div>
              )}

              {/* Collapsible JSON State Inspector */}
              <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex-1 flex flex-col min-h-[300px]">
                <h2 className="text-xs font-bold uppercase tracking-wider text-indigo-600 border-b border-slate-100 pb-3 flex items-center gap-2">
                  <Icon name="code" size={14} />
                  State Inspector
                </h2>
                <div className="mt-4 overflow-y-auto flex-1 max-h-[480px]">
                  {currentState ? (
                    <JsonInspector data={currentState} />
                  ) : (
                    <div className="text-center py-12 text-slate-400 flex flex-col items-center gap-2">
                      <Icon name="layers" size={24} className="text-slate-300" />
                      <p className="text-xs">Chạy agent để hiển thị cấu trúc State thô.</p>
                    </div>
                  )}
                </div>
              </div>

              {/* Sidebar Config Parameters Inputs */}
              <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <h2 className="text-xs font-bold uppercase tracking-wider text-indigo-600 border-b border-slate-100 pb-3 flex items-center gap-2">
                  <Icon name="sliders" size={14} />
                  Config parameters
                </h2>
                <div className="mt-4 flex flex-col gap-4">
                  <div>
                    <div className="flex justify-between items-center mb-1">
                      <label className="text-xs font-semibold text-slate-500">LLM Temperature</label>
                      <span className="text-xs font-mono text-indigo-600 font-bold">{temperature.toFixed(1)}</span>
                    </div>
                    <input 
                      type="range"
                      min="0"
                      max="1.0"
                      step="0.1"
                      value={temperature}
                      onChange={(e) => setTemperature(parseFloat(e.target.value))}
                      className="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                    />
                  </div>

                  <div>
                    <div className="flex justify-between items-center mb-1">
                      <label className="text-xs font-semibold text-slate-500">Max Concurrency</label>
                      <span className="text-xs font-mono text-indigo-600 font-bold">{concurrency} thread</span>
                    </div>
                    <input 
                      type="range"
                      min="1"
                      max="4"
                      step="1"
                      value={concurrency}
                      onChange={(e) => setConcurrency(parseInt(e.target.value))}
                      className="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                    />
                  </div>
                </div>
              </div>

            </div>

            {/* FULL-WIDTH GRAPH CANVAS — order-first spans the whole top row, so the diagram is fully visible without manual zoom */}
              <div className="xl:order-first xl:col-span-12 bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex flex-col h-[560px]">
                <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                  <h2 className="text-xs font-bold uppercase tracking-wider text-indigo-600 flex items-center gap-2">
                    <Icon name="activity" size={14} />
                    Interactive Canvas Map
                  </h2>
                  <div className="flex items-center gap-4 text-xs text-slate-500">
                    <span className="flex items-center gap-1.5">
                      <span className="w-2.5 h-2.5 rounded border border-emerald-500 bg-emerald-50"></span> Thành công
                    </span>
                    <span className="flex items-center gap-1.5">
                      <span className="w-2.5 h-2.5 rounded border border-indigo-500 bg-indigo-50 animate-pulse"></span> Đang chạy
                    </span>
                    <span className="flex items-center gap-1.5">
                      <span className="w-2.5 h-2.5 rounded border border-slate-300 bg-white"></span> Chờ chạy
                    </span>
                  </div>
                </div>

                {/* Canvas Area */}
                <div
                  id="canvas-bg"
                  ref={canvasRef}
                  style={{ width: '100%', height: '470px', display: 'block', position: 'relative' }}
                  className="bg-slate-50 rounded-xl mt-4 border border-slate-200 overflow-hidden grid-bg select-none cursor-grab active:cursor-grabbing"
                  onMouseDown={handleMouseDown}
                  onMouseMove={handleMouseMove}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                >
                  <div 
                    className="absolute inset-0 pointer-events-none"
                    style={{ 
                      transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, 
                      transformOrigin: 'top left',
                      width: '1700px',
                      height: '560px'
                    }}
                  >
                    <svg className="w-full h-full absolute inset-0 pointer-events-none">
                      <defs>
                        <marker id="arrow" viewBox="0 0 10 10" refX="16" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                          <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94a3b8" />
                        </marker>
                        <marker id="arrow-active" viewBox="0 0 10 10" refX="16" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                          <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4f46e5" />
                        </marker>
                      </defs>

                      {graphEdges.map((edge, index) => {
                        const fromNode = nodes[edge.from];
                        const toNode = nodes[edge.to];
                        if (!fromNode || !toNode) return null;

                        // Center anchors (node size: width NW, height NH)
                        const NW = NODE_W, NH = NODE_H;
                        const x1 = fromNode.x + NW / 2;
                        const y1 = fromNode.y + NH / 2;
                        const x2 = toNode.x + NW / 2;
                        const y2 = toNode.y + NH / 2;
                        const dx = x2 - x1;
                        const dy = y2 - y1;

                        // Generic router (coordinate-relative — no per-edge magic numbers).
                        // Only two edges need an explicit arc to clear nodes sitting on the spine row.
                        let path;
                        let textX = (x1 + x2) / 2;
                        let textY = (y1 + y2) / 2 - 3;

                        if (edge.from === "classify" && edge.to === "answer") {
                          // "simple" route skips the whole tool row → arc ABOVE the top branch row
                          const peak = nodes.risky_action.y - 70;
                          path = `M ${x1} ${y1} C ${x1 + 120} ${peak}, ${x2 - 120} ${peak}, ${x2} ${y2}`;
                          // place the label on the actual curve (cubic point at t=0.5)
                          textY = (y1 + y2 + 6 * peak) / 8;
                        } else if (edge.from === "clarify" && edge.to === "finalize") {
                          // arc BELOW the bottom branch row
                          const low = nodes.dead_letter.y + NH + 60;
                          path = `M ${x1} ${y1} C ${x1 + 120} ${low}, ${x2 - 120} ${low}, ${x2} ${y2}`;
                          // place the label on the actual curve (cubic point at t=0.5)
                          textY = (y1 + y2 + 6 * low) / 8;
                        } else if (Math.abs(dy) > Math.abs(dx)) {
                          // vertical-ish edge (branch / feedback loop) → vertical S-curve
                          const k = Math.max(40, Math.abs(dy) * 0.5);
                          path = `M ${x1} ${y1} C ${x1} ${y1 + (dy >= 0 ? k : -k)}, ${x2} ${y2 - (dy >= 0 ? k : -k)}, ${x2} ${y2}`;
                          textX = (x1 + x2) / 2 + 24;
                        } else {
                          // horizontal flow → horizontal S-curve
                          const k = Math.max(40, Math.abs(dx) * 0.45);
                          path = `M ${x1} ${y1} C ${x1 + (dx >= 0 ? k : -k)} ${y1}, ${x2 - (dx >= 0 ? k : -k)} ${y2}, ${x2} ${y2}`;
                        }

                        const active = isEdgeActive(edge);

                        const labelWidth = edge.label ? edge.label.length * 8 + 14 : 0;

                        return (
                          <g key={index}>
                            <path 
                              d={path} 
                              fill="none" 
                              stroke={active ? "#4f46e5" : "#94a3b8"} 
                              strokeWidth={active ? 4.5 : 2.5} 
                              markerEnd={active ? "url(#arrow-active)" : "url(#arrow)"}
                              className="transition-all duration-300"
                            />
                            {edge.label && (
                              <g>
                                <rect 
                                  x={textX - labelWidth / 2} 
                                  y={textY - 11}
                                  width={labelWidth}
                                  height={20}
                                  fill="#ffffff" 
                                  rx="4" 
                                  stroke={active ? "#4f46e5" : "#cbd5e1"} 
                                  strokeWidth="1"
                                  className="pointer-events-none"
                                />
                                <text
                                  x={textX}
                                  y={textY + 4}
                                  fill="#475569"
                                  fontSize="13"
                                  fontWeight="700"
                                  textAnchor="middle" 
                                  className="font-mono pointer-events-none"
                                >
                                  {edge.label}
                                </text>
                              </g>
                            )}
                          </g>
                        );
                      })}
                    </svg>

                    <div className="absolute inset-0 pointer-events-none">
                      {Object.entries(nodes).map(([name, node]) => {
                        const status = nodeStates[name] || "idle";
                        let borderClass = "border-slate-300 bg-white text-slate-700 shadow-sm";
                        let indicator = null;

                        if (status === "running") {
                          borderClass = "border-indigo-600 bg-indigo-50/50 text-indigo-700 animate-pulse-indigo";
                          indicator = <span className="absolute -top-1.5 -right-1.5 w-3.5 h-3.5 bg-indigo-600 rounded-full flex items-center justify-center"><span className="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span></span>;
                        } else if (status === "success") {
                          borderClass = "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-emerald-50/50";
                        } else if (status === "failed") {
                          borderClass = "border-rose-500 bg-rose-50 text-rose-800 shadow-rose-50/50";
                        }

                        return (
                          <div
                            key={name}
                            onMouseDown={(e) => startNodeDrag(e, name)}
                            onClick={() => {
                              if (draggingNode && draggingNode.moved) return; // ignore click after a drag
                              const info = currentState?.events?.find(e => e.node === name) || {};
                              setSelectedNode({ name, node, status, info });
                            }}
                            className={`pointer-events-auto absolute flex items-center justify-center gap-2 px-3 py-2 rounded-xl border text-[17px] font-bold select-none cursor-move shadow-sm ${borderClass} ${draggingNode && draggingNode.name === name ? 'ring-2 ring-indigo-400 z-20 transition-none' : 'transition-all duration-300'}`}
                            style={{ left: node.x, top: node.y, width: NODE_W, height: NODE_H }}
                          >
                            {indicator}
                            <Icon name={node.icon} size={18} className="opacity-75 shrink-0" />
                            <span className="truncate">{node.label}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Zoom Controls Overlay */}
                  <div className="absolute bottom-4 right-4 flex gap-1 bg-white border border-slate-200 rounded-xl p-1.5 shadow-sm z-10">
                    <button 
                      onClick={() => setZoom(z => Math.min(2, z + 0.1))} 
                      className="p-1.5 hover:bg-slate-100 rounded text-slate-600 transition" 
                      title="Zoom In"
                    >
                      <Icon name="zoom-in" size={14} />
                    </button>
                    <button 
                      onClick={() => setZoom(z => Math.max(0.4, z - 0.1))} 
                      className="p-1.5 hover:bg-slate-100 rounded text-slate-600 transition" 
                      title="Zoom Out"
                    >
                      <Icon name="zoom-out" size={14} />
                    </button>
                    <button 
                      onClick={fitView}
                      className="p-1.5 hover:bg-slate-100 rounded text-slate-600 transition"
                      title="Fit toàn bộ sơ đồ"
                    >
                      <Icon name="maximize" size={14} />
                    </button>
                  </div>
                </div>

                {selectedNode && (
                  <div className="mt-4 p-4 border border-slate-200 bg-slate-50/50 rounded-xl relative">
                    <button 
                      onClick={() => setSelectedNode(null)} 
                      className="absolute right-3 top-3 text-slate-400 hover:text-slate-600"
                    >
                      <Icon name="x" size={16} />
                    </button>
                    <div className="flex items-center gap-2">
                      <span className={`w-2.5 h-2.5 rounded-full ${selectedNode.status === 'success' ? 'bg-emerald-500' : selectedNode.status === 'failed' ? 'bg-rose-500' : selectedNode.status === 'running' ? 'bg-indigo-600 animate-pulse' : 'bg-slate-300'}`}></span>
                      <h3 className="text-sm font-bold text-slate-800">Node Info: {selectedNode.name}</h3>
                    </div>
                    <div className="mt-2 text-xs grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <span className="text-slate-400 uppercase font-semibold tracking-wider block text-[10px]">Loại node:</span>
                        <span className="text-slate-700 capitalize font-medium">{selectedNode.node.type} node</span>
                      </div>
                      <div>
                        <span className="text-slate-400 uppercase font-semibold tracking-wider block text-[10px]">Trạng thái:</span>
                        <span className="text-slate-700 capitalize font-medium">{selectedNode.status}</span>
                      </div>
                      {selectedNode.info.message && (
                        <div className="col-span-1 md:col-span-2 bg-white border border-slate-200 p-2.5 rounded-lg">
                          <span className="text-slate-400 uppercase font-semibold tracking-wider block text-[10px] mb-1">Kết quả thực thi (Audit Log):</span>
                          <span className="text-slate-700 block whitespace-pre-wrap leading-relaxed">{selectedNode.info.message}</span>
                          {selectedNode.info.latency_ms && <span className="text-[10px] text-indigo-500 font-semibold block mt-1.5">Latency: {selectedNode.info.latency_ms}ms</span>}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              {/* BOTTOM PANEL: Tool Outputs / HITL / Event Logs — sits in the columns row */}
              <div className="xl:col-span-6 bg-white border border-slate-200 rounded-2xl shadow-sm min-h-[350px] flex flex-col overflow-hidden">
                <div className="border-b border-slate-200 bg-slate-50 flex items-center justify-between px-6 py-2">
                  <div className="flex gap-2">
                    <button 
                      onClick={() => setActiveTab("logs")}
                      className={`flex items-center gap-1.5 px-3 py-2 text-xs font-bold border-b-2 transition ${activeTab === "logs" ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-500 hover:text-slate-800"}`}
                    >
                      <Icon name="terminal" size={14} />
                      Event Logs
                    </button>
                    <button 
                      onClick={() => setActiveTab("hitl")}
                      className={`flex items-center gap-1.5 px-3 py-2 text-xs font-bold border-b-2 transition relative ${activeTab === "hitl" ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-500 hover:text-slate-800"}`}
                    >
                      <Icon name="user-check" size={14} />
                      HITL Breakpoint
                      {interrupted && <span className="absolute top-1.5 right-1 w-2.5 h-2.5 bg-amber-500 rounded-full animate-ping"></span>}
                    </button>
                    <button 
                      onClick={() => setActiveTab("tools")}
                      className={`flex items-center gap-1.5 px-3 py-2 text-xs font-bold border-b-2 transition ${activeTab === "tools" ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-500 hover:text-slate-800"}`}
                    >
                      <Icon name="wrench" size={14} />
                      Tool Output
                    </button>
                  </div>
                  {activeTab === "logs" && (
                    <button 
                      onClick={() => setTerminalLogs([])}
                      className="text-xs text-slate-400 hover:text-slate-600 font-semibold"
                    >
                      Clear logs
                    </button>
                  )}
                </div>

                <div className="flex-1 p-5 min-h-[220px] max-h-[300px] overflow-y-auto">
                  
                  {activeTab === "logs" && (
                    <ReasoningStream logs={terminalLogs} />
                  )}

                  {activeTab === "hitl" && (
                    <div className="h-full flex flex-col justify-center items-center">
                      {interrupted && approvalRequest ? (
                        <div className="w-full max-w-lg bg-amber-50 border border-amber-200/60 p-5 rounded-2xl shadow-sm text-center">
                          <div className="w-12 h-12 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center mx-auto mb-3 shadow-inner">
                            <Icon name="shield-alert" size={24} />
                          </div>
                          <h3 className="text-sm font-bold text-slate-800">Cần phê duyệt của con người (Interrupt)</h3>
                          <p className="text-xs text-slate-500 mt-1">Yêu cầu chứa hành động thay đổi dữ liệu có độ rủi ro cao.</p>
                          
                          <div className="bg-white border border-amber-200 rounded-xl p-3 my-4 text-xs font-mono text-left text-slate-700 leading-relaxed max-w-md mx-auto">
                            <strong>Hành động đề xuất:</strong>
                            <p className="mt-1">{approvalRequest.proposed_action || "Đang chờ ý kiến phê duyệt..."}</p>
                          </div>

                          <div className="flex gap-3 justify-center max-w-xs mx-auto">
                            <button 
                              onClick={() => handleDecide(true)}
                              className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xs py-2.5 rounded-xl transition shadow-md shadow-emerald-100"
                            >
                              Approve / Tiếp tục
                            </button>
                            <button 
                              onClick={() => handleDecide(false)}
                              className="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-semibold text-xs py-2.5 rounded-xl transition shadow-md shadow-rose-100"
                            >
                              Reject / Từ chối
                            </button>
                          </div>
                        </div>
                      ) : (
                        <div className="text-slate-400 text-center py-12 flex flex-col items-center gap-2">
                          <Icon name="activity" size={24} className="text-slate-300" />
                          <p className="text-xs">Không có breakpoint. Luồng chưa bị ngắt hoặc chưa chạy.</p>
                        </div>
                      )}
                    </div>
                  )}

                  {activeTab === "tools" && (
                    <div className="h-full">
                      {currentState && (currentState.tool_results?.length > 0 || currentState.errors?.length > 0) ? (
                        <div className="flex flex-col gap-4">
                          {currentState.tool_results?.map((res, i) => (
                            <div key={i} className="bg-slate-50 border border-slate-200 p-3 rounded-xl">
                              <span className="text-[10px] uppercase font-bold text-slate-400 block tracking-wider mb-1">Tool Result {i+1}</span>
                              <pre className="text-xs font-mono bg-white border border-slate-100 p-2.5 rounded-lg text-slate-700 whitespace-pre-wrap break-all">{res}</pre>
                            </div>
                          ))}
                          {currentState.errors?.map((err, i) => (
                            <div key={i} className="bg-rose-50 border border-rose-200 p-3 rounded-xl text-rose-800">
                              <span className="text-[10px] uppercase font-bold text-rose-400 block tracking-wider mb-1">Execution Error {i+1}</span>
                              <p className="text-xs font-mono">{err}</p>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="text-slate-400 text-center py-12 flex flex-col items-center gap-2">
                          <Icon name="wrench" size={24} className="text-slate-300" />
                          <p className="text-xs">Không có kết quả công cụ (Tool Output) nào.</p>
                        </div>
                      )}
                    </div>
                  )}

                </div>
              </div>

            {/* RIGHT COLUMN: Always-on detailed CLI reasoning stream */}
            <div className="xl:col-span-3 flex flex-col gap-6">
              <div className="bg-white border border-slate-200 rounded-2xl shadow-sm flex flex-col h-[740px] overflow-hidden">
                <div className="flex items-center justify-between border-b border-slate-100 px-5 py-3">
                  <h2 className="text-xs font-bold uppercase tracking-wider text-indigo-600 flex items-center gap-2">
                    <Icon name="terminal" size={14} />
                    CLI Reasoning Stream
                  </h2>
                  <span className="flex items-center gap-1.5 text-[10px] font-semibold text-slate-400">
                    <span className={`w-2 h-2 rounded-full ${isPending ? 'bg-emerald-500 animate-pulse' : 'bg-slate-300'}`}></span>
                    {isPending ? 'Đang suy luận…' : 'Nhàn rỗi'}
                  </span>
                </div>
                <p className="px-5 pt-3 pb-1 text-[11px] text-slate-500 leading-relaxed">
                  Nhật ký suy luận chi tiết từ Python core: <span className="font-semibold text-slate-600">node</span>,
                  <span className="font-semibold text-fuchsia-500"> routing</span>, LLM, retry &amp; HITL.
                </p>
                <div className="flex-1 px-4 pb-4 pt-1 overflow-hidden">
                  <ReasoningStream logs={terminalLogs} emptyHint="Chạy agent để xem quá trình suy luận chi tiết." />
                </div>
              </div>
            </div>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
